services:
  traefik:
    image: traefik:3.6
    container_name: traefik-container
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443/tcp'
      - '443:443/udp'
      - '8080:8080'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./config/traefik.yml:/traefik.yml:ro
      - ./config/traefik_dynamic.yml:/traefik_dynamic.yml:ro
      - ./acme.json:/acme.json
    networks:
      - traefik

  whoami:
    image: "traefik/whoami"
    container_name: "whoami"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.whoami.rule=Host(`whoami.hainhome.com`)"
      - "traefik.http.routers.whoami.entrypoints=websecure"
    mem_limit: 10m
    networks:
      - traefik

networks:
  traefik:
    external: true
