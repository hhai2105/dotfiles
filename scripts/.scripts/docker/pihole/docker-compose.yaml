services:
  pihole:
    container_name: pihole
    image: pihole/pihole:latest
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
      - "traefik.enable=true"
      - "traefik.http.routers.pihole.rule=Host(`pihole.docker.local`)"
      - "traefik.http.routers.pihole.entrypoints=websecure"
      - "traefik.http.routers.pihole.tls=true"
      - "traefik.http.routers.pihole.service=pihole-svc"          # ← tie router to service
      - "traefik.http.services.pihole-svc.loadbalancer.server.port=80"  # ← named service on port 80
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      # Keep direct access as fallback, or remove if only using Traefik
      - "8444:80/tcp"
    environment:
      TZ: 'America/New_York'
      FTLCONF_webserver_api_password: '48657'
      FTLCONF_dns_listeningMode: 'ALL'
    volumes:
      - './etc-pihole:/etc/pihole'
    cap_add:
      - NET_ADMIN
      - SYS_TIME
      - SYS_NICE
    restart: unless-stopped
    networks:
      - proxy

networks:
  proxy:
    external: true
