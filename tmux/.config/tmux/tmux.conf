set -g status-style 'bg=#090819 fg=#42c6ff'
set -g base-index 1
set -g renumber-windows on
set -g mouse on

set -g default-terminal xterm-256color

unbind-key C-b
set-option -g prefix C-Space

bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"

unbind-key -n C-7
unbind-key -n C-8
unbind-key -n C-9
unbind-key -n C-0
unbind-key -n C-S-P
unbind-key -n C-S-N

# unbind numbers for window switching
unbind-key 1
unbind-key 2
unbind-key 3
unbind-key 4
unbind-key 5
unbind-key 6
unbind-key 7
unbind-key 8
unbind-key 9
unbind-key 0

bind-key -n C-7 send-keys C-7


set-window-option -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -in -selection clipboard'

# vim-like pane switching
bind -r ^ last-window
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R
bind -r D run-shell "tmux neww -c '#{pane_current_path}' 'nvim TODO.md'"

# split panes
unbind t
bind v split-window -h -c '#{pane_current_path}'
bind s split-window -v -c '#{pane_current_path}'
bind t run-shell "if [ \$(tmux list-windows | wc -l) -lt 4 ]; then tmux new-window -c '#{pane_current_path}'; else tmux display-message 'Max 4 tabs'; fi"

# window switching with u i o p (direct window select)
bind u select-window -t 1
bind i select-window -t 2
bind o select-window -t 3
bind p select-window -t 4

# move window to position (Shift+key) - swaps and follows focus
bind U swap-window -t 1 \; select-window -t 1
bind I swap-window -t 2 \; select-window -t 2
bind O swap-window -t 3 \; select-window -t 3
bind P swap-window -t 4 \; select-window -t 4

# window menu and close
unbind w
bind b choose-window
bind w kill-window
